<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - StyleEase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 20px;
        }
        
        /* Container */
        .container {
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        /* Form inputs */
        form input, form textarea, form select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        /* Buttons */
        button {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background-color: #0056b3;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        /* Cart and Order Items */
        ul {
            list-style: none;
            padding: 0;
        }
        
        li {
            padding: 10px;
            margin: 10px 0;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .logout {
            background-color: #f44336;
        }
        
        .logout:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="header">Your Cart</div>
    <div class="container">
        <h1>Selected Products</h1>
        <p>Here are the products you added to your cart:</p>
        <ul>
            <li>T-Shirt - $25</li>
            <li>Jeans - $40</li>
            <!-- Simulated static items -->
        </ul>
        <button onclick="location.href='place_order.html'">Place Order</button>
        <button onclick="location.href='view_products.html'">Add More Products</button>
        <button onclick="location.href='dashboard.html'">Back to Dashboard</button>
    </div>
</body>
</html>
